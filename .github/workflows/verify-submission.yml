name: Verify Submission Liveness

# Second-layer CI check: runs AFTER structural validation (validate-pr.yml).
# Verifies that submitted github_url repos are public, have licenses, and that
# claimed packages actually exist on the declared registry.
# Only fires on PRs that touch community-servers.yml.

on:
  pull_request:
    paths:
      - 'community-servers.yml'

concurrency:
  group: verify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-liveness:
    name: Liveness & Authenticity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch both the PR head and the base so we can diff new entries only.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # yaml is also used by validate-pr.yml — install it the same way.
      - name: Install dependencies
        run: npm install yaml@2.7.0

      - name: Run liveness checks
        id: liveness
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        # Capture the full output so we can parse the JSON summary block later.
        # We use `set +e` so the step records the exit code without aborting the
        # job prematurely — the next step handles posting the PR comment first.
        run: |
          set +e
          node scripts/verify-submission-liveness.mjs 2>&1 | tee /tmp/liveness-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post PR comment and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = Number('${{ steps.liveness.outputs.exit_code }}');
            const rawOutput = fs.readFileSync('/tmp/liveness-output.txt', 'utf8');

            // Extract the embedded JSON summary block written by the script.
            const jsonMatch = rawOutput.match(/__LIVENESS_RESULT_JSON__([\s\S]*?)__END_LIVENESS_RESULT_JSON__/);
            let failures = [];
            let warnings = [];
            if (jsonMatch) {
              try {
                const parsed = JSON.parse(jsonMatch[1].trim());
                failures = parsed.failures ?? [];
                warnings = parsed.warnings ?? [];
              } catch (e) {
                warnings.push({ entry: 'script', check: 'parse', message: `Could not parse liveness result JSON: ${e.message}` });
              }
            }

            const prNumber = context.payload.pull_request.number;

            // --- Build comment body ---
            let body;
            if (exitCode !== 0 || failures.length > 0) {
              const failLines = failures.map(f => `- **FAIL** \`[${f.entry}]\` \`${f.check}\`: ${f.message}`).join('\n');
              const warnLines = warnings.length > 0
                ? '\n\n**Warnings (review required):**\n' + warnings.map(w => `- **WARN** \`[${w.entry}]\` \`${w.check}\`: ${w.message}`).join('\n')
                : '';
              body = `## Liveness & Authenticity Check Failed\n\nThe following issues were found:\n\n${failLines}${warnLines}\n\nPlease fix these issues and push again.`;
            } else if (warnings.length > 0) {
              const warnLines = warnings.map(w => `- **WARN** \`[${w.entry}]\` \`${w.check}\`: ${w.message}`).join('\n');
              body = `## Liveness & Authenticity Check — Warnings\n\nAll hard checks passed, but the following items need human review:\n\n${warnLines}`;
            } else {
              body = `## Liveness & Authenticity Check Passed\n\nAll entries verified: repos are public, packages are published, and no owner-match anomalies detected. ✓`;
            }

            // --- Post or update comment ---
            // Find an existing comment from this workflow to update (avoid flooding).
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('Liveness & Authenticity')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body,
              });
            }

            // --- Apply labels ---
            // Remove any previously-applied liveness labels first (idempotent).
            const labelsToRemove = ['needs-changes', 'needs-human-review', 'ready-for-review'];
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              ...context.repo,
              issue_number: prNumber,
            });
            for (const label of labelsToRemove) {
              if (currentLabels.some(l => l.name === label)) {
                try {
                  await github.rest.issues.removeLabel({
                    ...context.repo,
                    issue_number: prNumber,
                    name: label,
                  });
                } catch (_) { /* label may have already been removed — safe to ignore */ }
              }
            }

            let applyLabel;
            if (exitCode !== 0 || failures.length > 0) {
              applyLabel = 'needs-changes';
            } else if (warnings.length > 0) {
              applyLabel = 'needs-human-review';
            } else {
              applyLabel = 'ready-for-review';
            }

            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: prNumber,
              labels: [applyLabel],
            });

            // Fail the workflow job itself when there are hard failures.
            if (exitCode !== 0 || failures.length > 0) {
              core.setFailed(`Liveness checks failed (${failures.length} failure(s), ${warnings.length} warning(s))`);
            }
